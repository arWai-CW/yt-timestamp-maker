<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>YouTube Timestamp Maker</title>
	<link rel="stylesheet" href="popup.css">
</head>
<body>
		<div id="app">
			<header class="header">
				<h1 id="title">Timestamp Tool</h1>
				<span id="video-id" class="video-id"></span>
			</header>

			<main class="main-content">
				<div id="video-info" class="video-info hidden">
					<p id="video-title" class="video-title"></p>
				</div>

				<div id="saved-videos" class="saved-videos">
					<h3 id="saved-videos-title" class="saved-videos-title">Saved Videos</h3>
					<div id="saved-videos-list" class="saved-videos-list"></div>
				</div>

				<div id="not-video" class="not-video hidden">
					<p id="not-video-msg">Open a YouTube video page to use this extension.</p>
					<a href="https://www.youtube.com" target="_blank" id="youtube-link" class="youtube-link">Go to YouTube</a>
				</div>
			</main>

			<footer class="footer">
				<button id="show-panel" class="btn btn-full">Show Panel</button>
			</footer>

			<div class="toast" id="toast"></div>
		</div>

	<script src="popup.js"></script>
</body>
</html>
